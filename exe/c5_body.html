      .hero-c {
        --bg: #F4F2EB;
        --ink: #14150F;
        --ink-2: #4A4B43;
        --ink-3: #8C8B81;
        --line: #E2DECE;
        --line-2: #CFCAB6;
        --panel: #FCFBF6;
        --green: #15A754;
        --green-deep: #0B6B36;
        --green-soft: #E5F2EA;
        font-family: 'Pretendard', system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        padding: 80px 64px;
        box-sizing: border-box;
        width: 100%; min-height: 100%;
      }

      .hc-top { text-align: center; margin-bottom: 40px; }
      .hc-h1 {
        margin: 0 0 14px;
        font-size: 52px; line-height: 1.18;
        font-weight: 800; letter-spacing: -0.03em;
      }
      .hc-accent { color: var(--green); }
      .hc-sub {
        margin: 0; color: var(--ink-2);
        font-size: 17px; font-weight: 500;
      }

      .hc-frame {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px; overflow: hidden;
        box-shadow: 0 30px 60px -30px rgba(20,21,15,0.15);
        margin-bottom: 36px;
      }
      .hc-frame-bar {
        display: flex; align-items: center; gap: 14px;
        padding: 10px 14px;
        background: #EEEADB;
        border-bottom: 1px solid var(--line);
      }
      .frame-dots { display: flex; gap: 6px; }
      .frame-dots span {
        width: 10px; height: 10px; border-radius: 50%;
        background: var(--line-2);
      }
      .frame-url {
        flex: 1; text-align: center;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 12px; color: var(--ink-2);
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 8px; padding: 5px 12px;
        max-width: 360px; margin: 0 auto;
      }
      .frame-spacer { width: 50px; }

      .hc-frame-body { padding: 32px 40px; }

      .pipe { }
      .stg {
        display: grid;
        grid-template-columns: 44px 1fr;
        gap: 20px;
        padding: 18px 0;
      }
      .stg:first-child { padding-top: 0; }
      .stg:last-child { padding-bottom: 0; }

      .rail { display: flex; flex-direction: column; align-items: center; }
      .circle {
        width: 36px; height: 36px; border-radius: 50%;
        display: grid; place-items: center;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 14px; font-weight: 700;
        flex-shrink: 0;
      }
      .stg-done .circle { background: var(--green); color: #fff; }
      .stg-active .circle {
        background: var(--panel);
        border: 2px solid var(--green);
      }
      .pulse {
        width: 12px; height: 12px; border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 5px rgba(21,167,84,0.2);
        animation: c-pulse 1.6s ease-in-out infinite;
      }
      @keyframes c-pulse {
        0%, 100% { box-shadow: 0 0 0 5px rgba(21,167,84,0.2); }
        50% { box-shadow: 0 0 0 10px rgba(21,167,84,0); }
      }
      .stg-pending .circle {
        background: var(--panel);
        border: 1.5px dashed var(--line-2);
        color: var(--ink-3);
      }
      .line {
        flex: 1; width: 2px;
        background: var(--green);
        margin: 6px 0 -18px;
      }
      .stg-pending .line, .stg-active .line {
        background: var(--line);
      }
      .stg:last-child .line { display: none; }

      .body { padding-top: 4px; }
      .title {
        font-size: 20px; font-weight: 800; color: var(--ink);
        letter-spacing: -0.01em;
      }
      .stg-pending .title { color: var(--ink-3); }
      .count {
        margin-top: 4px;
        font-family: 'IBM Plex Mono', monospace;
        font-size: 13px; color: var(--ink-2);
      }
      .stg-active .count {
        color: var(--green-deep); font-weight: 700;
      }

      .detail {
        margin-top: 14px;
        background: var(--green-soft);
        border-left: 3px solid var(--green);
        border-radius: 0 10px 10px 0;
        padding: 14px 18px;
      }
      .d-target {
        display: inline-flex; align-items: center; gap: 8px;
        font-size: 12px; color: var(--ink-2);
        margin-bottom: 8px;
      }
      .d-ava {
        width: 20px; height: 20px; border-radius: 50%;
        background: #fff; color: var(--ink-2);
        display: grid; place-items: center;
        font-size: 11px; font-weight: 700;
      }
      .d-text {
        font-size: 14px; line-height: 1.7;
        color: var(--ink);
      }
      .cursor {
        display: inline-block;
        width: 1.5px; height: 14px;
        background: var(--green);
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: cursor-blink 0.9s steps(1) infinite;
      }
      @keyframes cursor-blink { 50% { opacity: 0; } }

      .hc-cta-wrap { text-align: center; }
      .hc-cta {
        background: var(--green); color: #fff;
        border: none; cursor: pointer;
        font-family: inherit; font-weight: 700;
        font-size: 16px; padding: 18px 32px;
        border-radius: 12px;
        box-shadow: 0 14px 28px -12px rgba(21,167,84,0.5);
      }
